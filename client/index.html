<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>InsightProfit OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Theme bootstrap: apply saved theme BEFORE React mounts to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('ip-theme');
        if (t === 'frost') {
          document.documentElement.setAttribute('data-theme', 'frost');
          var l = document.createElement('link');
          l.rel = 'stylesheet'; l.id = 'frost-css'; l.href = '/frost.css';
          document.head.appendChild(l);
          var s = document.createElement('script');
          s.src = '/frost-init.js'; document.head.appendChild(s);
        } else if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/theme-picker.js" defer></script>
  </body>
</html>
