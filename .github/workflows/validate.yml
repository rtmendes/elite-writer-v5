name: Lint & Build Validation

# PR-only — runs once per pull request, not again on the merge push, to keep
# GitHub Actions minutes low. Deploys happen on the VPS via cron (no Actions).
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high || echo "⚠️ Dependency audit found issues (non-blocking)"

      - name: TypeScript check
        run: pnpm tsc --noEmit || true

      - name: Lint report
        run: pnpm eslint . --max-warnings 600 || echo "⚠️ Lint issues found — see above. Non-blocking until tech debt is resolved."

      - name: Tests
        run: pnpm vitest run

      - name: Build check
        run: pnpm build
