name: Deploy Elite Writer V5

# Auto-deploy is handled on the VPS by scripts/deploy-poll.sh (cron) to avoid
# burning GitHub Actions minutes. This workflow stays as a manual fallback only.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /opt/elite-writer-v5
            cd /opt/elite-writer-v5
            sudo chown -R ubuntu:ubuntu .git
            git pull origin main
            docker compose build --no-cache elite-writer
            docker compose up -d elite-writer
            echo "✅ Elite Writer V5 deployed at $(date)"
            
      - name: Verify Deployment
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://elitewriter.insightprofit.live)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment verified - HTTP $STATUS"
          else
            echo "❌ Deployment failed - HTTP $STATUS"
            exit 1
          fi
