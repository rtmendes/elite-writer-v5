# Elite Writer V5 — Docker Compose for Oracle VPS
# Uses existing MySQL container (thepopebot-mysql) on coolify network

version: "3.8"

services:
  elite-writer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL
        - VITE_SUPABASE_ANON_KEY
    container_name: elite-writer-v5
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elite-writer.rule=Host(`elitewriter.insightprofit.live`)"
      - "traefik.http.routers.elite-writer.entrypoints=https"
      - "traefik.http.routers.elite-writer.tls=true"
      - "traefik.http.routers.elite-writer.tls.certresolver=letsencrypt"
      - "traefik.http.services.elite-writer.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.elite-writer-http.rule=Host(`elitewriter.insightprofit.live`)"
      - "traefik.http.routers.elite-writer-http.entrypoints=http"
      - "traefik.http.routers.elite-writer-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Durable job queue backing the proactive agent loop (BullMQ).
  redis:
    image: redis:7-alpine
    container_name: elite-writer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - elite-writer-redis:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  elite-writer-redis:

networks:
  coolify:
    external: true
